# Dependabot keeps our pinned dependencies fresh. SHA-pinning GitHub Actions and
# version-locking Cargo crates freezes them at a known-good commit/checksum — but
# without automated bumps those pins rot and we silently miss upstream security
# fixes. Dependabot opens review-gated PRs that advance the pin *and* rewrite the
# `# vX.Y.Z` comment next to each SHA-pinned action.
#
# Commit-message prefixes follow this repo's Conventional Commits (AGENTS.md):
#   ci   -> GitHub Actions workflow bumps
#   deps -> Cargo crate bumps
version: 2
updates:
  # GitHub Actions used by .github/workflows/*.yml — all pinned to full commit SHAs.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One PR per week for all action bumps instead of one PR per action.
      actions:
        patterns:
          - "*"

  # Cargo workspace (root Cargo.toml + Cargo.lock). Registry crates are pinned by
  # exact version + checksum in Cargo.lock; Dependabot proposes the upgrades.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    ignore:
      # rand 0.8 / sha2 0.10 are what `oauth2` 5 (via azapptoolkit-auth) and
      # `tauri-codegen` already resolve to, and src-tauri deliberately shares
      # those versions. Bumping our direct pins to rand 0.9+ / sha2 0.11+ would
      # not remove the old majors — it would duplicate a crypto major in the
      # graph (AGENTS.md "Crypto deps"). Drop these ignores once oauth2/Tauri
      # move first. NOTE: `rsa` is not in this graph at all — cert generation
      # uses rcgen on the aws_lc_rs backend specifically to keep it out
      # (RUSTSEC-2023-0071); don't reintroduce it.
      - dependency-name: rand
        versions: [">=0.9"]
      - dependency-name: sha2
        versions: [">=0.11"]
    groups:
      # Batch low-risk semver-compatible bumps; majors stay as individual PRs so a
      # breaking upgrade gets its own review.
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # The WASM frontend crate is EXCLUDED from the root workspace (targets
  # wasm32-unknown-unknown) and carries its own Cargo.toml + Cargo.lock — including
  # the git-pinned `tauri-sys` rev — so it needs a separate Dependabot entry.
  - package-ecosystem: cargo
    directory: /apps/desktop/web-rs
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

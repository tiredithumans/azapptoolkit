name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly RustSec database refresh so we catch advisories filed after merge.
    - cron: "0 6 * * 1"

# A new push to the same branch/PR supersedes the in-flight run — without this
# every PR update queues a duplicate full 3-OS matrix.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token for every job. Declared explicitly so a future change
# to the repo-level default can't silently re-broaden these workflows.
permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Match the pinned MSRV in rust-toolchain.toml (which rustup honors for the
      # actual build regardless of this line) so the installed toolchain is not
      # misleadingly older than what compiles.
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: fmt
        run: just fmt-check
      - name: clippy
        run: just clippy
      - name: test
        run: just test

  web:
    name: Frontend (Leptos/WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/web-rs
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just,trunk,wasm-pack
      # web-rs is excluded from the root workspace, so the `rust` job's
      # `cargo fmt --all` does not reach it — format-check it here.
      - name: fmt
        run: just web-fmt-check
      # web-rs is excluded from the root workspace, so the `rust` job's clippy
      # never reaches this IPC-privileged tier — lint it here (wasm target,
      # -D warnings), mirroring the backend fmt→clippy→test order.
      - name: clippy
        run: just web-clippy
      - name: Test frontend
        run: just web-test
      - name: Build frontend
        run: just web-build
      # GUI functionality tests in a headless browser (mocked Tauri IPC, no
      # tenant). Pin the runner's chromedriver — GitHub keeps it version-matched
      # to the installed Chrome — so wasm-pack uses it instead of downloading a
      # copy that may mismatch and fail to start a session.
      - name: GUI tests (headless Chrome)
        run: just web-itest --chromedriver "$CHROMEWEBDRIVER/chromedriver"

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Workflow-file syntax gate. release.yml sat unparseable for ~7 weeks
      # (`secrets` context in a step-level `if`) with no signal beyond 0-second
      # "workflow file issue" runs — actionlint turns that into a failing PR
      # check. Pinned by version + checksum (no install-action manifest exists).
      - name: actionlint
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # RustSec advisory scan via the same `just` recipes run locally (ignore
      # list in .cargo/audit.toml). Covers BOTH lockfiles: the root workspace
      # and the frontend's own Cargo.lock (web-rs is excluded from the
      # workspace, so the root scan never sees it).
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just,cargo-audit
      - name: audit (workspace)
        run: just audit
      - name: audit (web-rs lockfile)
        run: just web-audit

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # License policy + crate-source gating (see deny.toml). Complements the
      # advisory-only `audit` job above. Flags live in the `deny`/`web-deny`
      # justfile recipes; web-deny gates the frontend tree the root check
      # can't reach.
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just,cargo-deny
      - name: deny (workspace)
        run: just deny
      - name: deny (web-rs)
        run: just web-deny

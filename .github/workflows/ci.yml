name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly RustSec database refresh so we catch advisories filed after merge.
    # Only the dependency-advisory jobs (audit/deny) run on this tick — the
    # compile-heavy jobs are gated off `schedule` (see their `if:`), so the cron
    # doesn't re-run a full 3-OS matrix it never needed.
    - cron: "0 6 * * 1"

# A new push to the same branch/PR supersedes the in-flight run — without this
# every PR update queues a duplicate full 3-OS matrix.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token for every job. Declared explicitly so a future change
# to the repo-level default can't silently re-broaden these workflows.
permissions:
  contents: read

jobs:
  # Detect whether anything that affects a build/test/lint actually changed.
  # Docs-only changes (Markdown, docs/, LICENSE, .claude/) set code=false, which
  # the downstream jobs use to skip their work WITHOUT skipping the job — so every
  # required status check still reports (a path-filtered *workflow* would instead
  # leave required checks pending forever and block the merge). Non-PR/push events
  # (schedule, manual dispatch) always report code=true so audit/deny still run.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -uo pipefail
          # Default to running the full suite. Only an event with a diff that we
          # can read AND that turns out to be entirely docs flips this to false,
          # so any unexpected path (unknown event, failed diff) is fail-safe.
          code=true
          if [ "$EVENT" = "pull_request" ] || [ "$EVENT" = "push" ]; then
            if [ "$EVENT" = "pull_request" ]; then
              range=("$BASE_SHA...HEAD")
            elif [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              range=("HEAD~1" "HEAD")
            else
              range=("$BEFORE_SHA" "$GITHUB_SHA")
            fi
            if files=$(git diff --name-only "${range[@]}" 2>/dev/null); then
              echo "Changed files:"; printf '%s\n' "$files"
              code=false
              while IFS= read -r f; do
                if [ -z "$f" ]; then continue; fi
                case "$f" in
                  *.md|docs/*|LICENSE|LICENSE.*|.claude/*) : ;;  # docs / non-build
                  *) code=true ;;                               # anything else → build
                esac
              done <<< "$files"
            else
              echo "diff failed for range '${range[*]}' — running full CI"
            fi
          fi
          echo "code=$code"
          echo "code=$code" >> "$GITHUB_OUTPUT"

  rust:
    name: Rust workspace (${{ matrix.os }})
    # The weekly cron only needs audit/deny; skip the compile-heavy matrix on it.
    if: github.event_name != 'schedule'
    needs: changes
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Docs-only change: skip every build/test step below but let the job
      # succeed, so the required "Rust workspace (...)" contexts still report.
      - name: Skip notice (docs-only change)
        if: needs.changes.outputs.code != 'true'
        run: echo "Docs-only change — backend build/test skipped."
      # Match the pinned MSRV in rust-toolchain.toml (which rustup honors for the
      # actual build regardless of this line) so the installed toolchain is not
      # misleadingly older than what compiles.
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        if: needs.changes.outputs.code == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: needs.changes.outputs.code == 'true'
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        if: needs.changes.outputs.code == 'true'
        with:
          tool: just
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest' && needs.changes.outputs.code == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      - name: fmt
        if: needs.changes.outputs.code == 'true'
        run: just fmt-check
      - name: clippy
        if: needs.changes.outputs.code == 'true'
        run: just clippy
      - name: test
        if: needs.changes.outputs.code == 'true'
        run: just test

  web:
    name: Frontend (Leptos/WASM)
    # Skipped on the weekly cron (audit/deny only) and on docs-only changes. A
    # skipped job reports its required check as satisfied, so the merge gate stays
    # green without running the WASM build / GUI tests.
    if: github.event_name != 'schedule' && needs.changes.outputs.code == 'true'
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/web-rs
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: just,trunk,wasm-pack
      # web-rs is excluded from the root workspace, so the `rust` job's
      # `cargo fmt --all` does not reach it — format-check it here.
      - name: fmt
        run: just web-fmt-check
      # web-rs is excluded from the root workspace, so the `rust` job's clippy
      # never reaches this IPC-privileged tier — lint it here (wasm target,
      # -D warnings), mirroring the backend fmt→clippy→test order.
      - name: clippy
        run: just web-clippy
      - name: Test frontend
        run: just web-test
      - name: Build frontend
        run: just web-build
      # GUI functionality tests in a headless browser (mocked Tauri IPC, no
      # tenant). Pin the runner's chromedriver — GitHub keeps it version-matched
      # to the installed Chrome — so wasm-pack uses it instead of downloading a
      # copy that may mismatch and fail to start a session.
      - name: GUI tests (headless Chrome)
        run: just web-itest --chromedriver "$CHROMEWEBDRIVER/chromedriver"

  actionlint:
    name: actionlint
    # Skipped on the weekly cron and on docs-only changes (no workflow files
    # touched). Skipped job ⇒ the required check still reports satisfied.
    if: github.event_name != 'schedule' && needs.changes.outputs.code == 'true'
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Workflow-file syntax gate. release.yml sat unparseable for ~7 weeks
      # (`secrets` context in a step-level `if`) with no signal beyond 0-second
      # "workflow file issue" runs — actionlint turns that into a failing PR
      # check. Pinned by version + checksum (no install-action manifest exists).
      - name: actionlint
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  audit:
    name: cargo-audit
    # Runs on code/dependency changes and on the weekly cron (the change-detection
    # job reports code=true for schedule events). Docs-only changes skip it — no
    # dependencies changed — and the skipped job keeps the required check satisfied.
    if: needs.changes.outputs.code == 'true'
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # RustSec advisory scan via the same `just` recipes run locally (ignore
      # list in .cargo/audit.toml). Covers BOTH lockfiles: the root workspace
      # and the frontend's own Cargo.lock (web-rs is excluded from the
      # workspace, so the root scan never sees it).
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: just,cargo-audit
      - name: audit (workspace)
        run: just audit
      - name: audit (web-rs lockfile)
        run: just web-audit

  deny:
    name: cargo-deny
    # Same gating as audit: code/dependency changes and the weekly cron run it;
    # docs-only changes skip it, leaving the required check satisfied.
    if: needs.changes.outputs.code == 'true'
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # License policy + crate-source gating (see deny.toml). Complements the
      # advisory-only `audit` job above. Flags live in the `deny`/`web-deny`
      # justfile recipes; web-deny gates the frontend tree the root check
      # can't reach.
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: just,cargo-deny
      - name: deny (workspace)
        run: just deny
      - name: deny (web-rs)
        run: just web-deny

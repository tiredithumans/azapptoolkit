name: CodeQL

on:
  push:
    branches: [main]
    # Docs-only pushes have no code to analyze; skip them. Safe to path-filter
    # here (unlike ci.yml) because CodeQL is not a required status check, so a
    # skipped run can't leave a required check pending.
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "LICENSE.*"
      - ".claude/**"
  # PRs no longer trigger CodeQL: it's not a required check, and the 2.25.6
  # extractor doesn't expand Rust macros (~39% call-target resolution), so
  # PR-level alerts add little. Default-branch coverage (push) + the weekly
  # re-scan below keep the Security tab current.
  schedule:
    # Weekly re-scan so new CodeQL query/extractor releases reach old code.
    # Wednesday, a distinct slot from ci.yml's Monday cron, so the two heavy
    # workflows don't pile onto the same scheduled tick.
    - cron: "0 6 * * 3"

# A new push to the same branch/PR supersedes the in-flight run (mirrors ci.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token, declared explicitly. analyze needs security-events:write
# to upload SARIF; actions:read lets the action read workflow run metadata.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Rust is supported only in build-mode `none`. The prep below (pinned
      # toolchain, wasm32 target for the excluded web-rs crate, native deps,
      # frontend-dist stub, pre-fetched deps) is correct hygiene and future-proofs
      # extraction, but DOES NOT improve the current quality metric: CodeQL
      # 2.25.6's Rust extractor does not expand macros — proc OR builtin — for this
      # codebase regardless of config, so "% calls with call target" sits at ~39%
      # (a known extractor limit; cf. github/codeql#20643, #20659). Confirmed by
      # forcing sysroot/proc_macro_server to real paths — byte-identical result.
      # Revisit when a newer CodeQL bundle ships working Rust macro expansion
      # (branch ci/codeql-proc-macro-expansion holds the setup to re-apply).
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            .
            apps/desktop/web-rs
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: just
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      # `tauri::generate_context!` (src-tauri/src/lib.rs) panics at COMPILE time if
      # apps/desktop/web-rs/dist is absent. Inert today (2.25.6 doesn't expand the
      # macro anyway) but kept so extraction stays clean once a CodeQL release does.
      - name: Stub frontend dist
        run: just _stub-frontend-dist
      # Pre-fetch both lockfiles (the root workspace and the workspace-excluded
      # web-rs, incl. its git-pinned tauri-sys) so the extractor resolves call
      # targets into dependencies instead of leaving them unresolved.
      - name: Fetch dependencies
        run: |
          cargo fetch --locked
          cargo fetch --locked --manifest-path apps/desktop/web-rs/Cargo.toml --target wasm32-unknown-unknown

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:rust"

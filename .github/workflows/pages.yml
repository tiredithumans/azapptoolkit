name: Demo (GitHub Pages)

# Builds the Leptos/WASM frontend with the `demo` feature (mock IPC + curated
# sample data, no Tauri backend) and publishes it to GitHub Pages, so the full UI
# is browsable at https://tiredithumans.github.io/azapptoolkit/ with no install
# and no sign-in. Requires Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/web-rs/**"
      - "justfile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Pages deploy needs to write the Pages artifact and mint an OIDC token; the
# build only reads the repo. Declared explicitly so a repo-default change can't
# silently re-broaden them.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy (it can leave Pages half-published); queue
# instead. Independent of the CI concurrency group.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/web-rs
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: just,trunk
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      # The base href must match the Pages subpath so the hashed JS/WASM/CSS
      # resolve under https://<user>.github.io/<repo>/.
      - name: Build demo bundle
        run: just web-build-pages "/azapptoolkit/"
      # GitHub Pages runs Jekyll by default, which can drop files; opt out. Emit
      # it into the (gitignored) dist rather than committing it.
      - name: Disable Jekyll
        run: touch apps/desktop/web-rs/dist/.nojekyll
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: apps/desktop/web-rs/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Whichever attempt succeeded carries the page_url (a failed attempt emits none).
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # The GitHub Pages backend intermittently fails the deployment with
      # "Deployment failed, try again later" on the first status poll (~1 run in 30)
      # even when the build + uploaded artifact are fine — a known transient in
      # actions/deploy-pages, not a config error (a manual re-run always clears it).
      # `continue-on-error` stops that flake from failing the job; one delayed retry
      # recovers it, taking the effective failure rate from ~3% to ~0.1%. If the
      # retry ALSO fails, the job fails (it has no continue-on-error) — so a real,
      # persistent Pages outage still surfaces. Keep the pinned SHA in sync across
      # both attempts.
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Pause before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

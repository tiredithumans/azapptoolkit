name: Release (installers)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Two tags pushed close together (exactly the forward-fix scenario in the
# "Pulling a bad release" runbook) must not race on runners or on which
# latest.json the endpoint serves — queue them instead. Never cancel: a
# half-cancelled release run is worse than a slow one.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Fail fast (before the long cross-platform build) on a mis-tagged release:
  # version drift between the tag and the manifests, or a placeholder updater
  # key. Re-runs the RustSec scan against the exact lockfile this tag builds.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The installer/updater take their version from tauri.conf.json, but
      # latest.json takes it from the tag — a mismatch makes the updater
      # advertise an upgrade that installs the same bytes (a loop). The runbook
      # bumps three manifests in lockstep; enforce all three so the binary's
      # crate version can't drift from the installer/updater version.
      - name: Guard tag matches manifest versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $conf = Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if ($conf.version -ne $tag) {
            Write-Error "release tag v$tag does not match tauri.conf.json version $($conf.version) — bump the manifest (and both Cargo versions) before tagging"
            exit 1
          }
          function Get-CargoVersion($path) {
            $raw = Get-Content $path -Raw
            if ($raw -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
              Write-Error "could not find the package/workspace version in $path"
              exit 1
            }
            return $Matches[1]
          }
          $ws = Get-CargoVersion 'Cargo.toml'
          if ($ws -ne $tag) {
            Write-Error "release tag v$tag does not match the Cargo workspace version $ws — bump [workspace.package] version before tagging"
            exit 1
          }
          $web = Get-CargoVersion 'apps/desktop/web-rs/Cargo.toml'
          if ($web -ne $tag) {
            Write-Error "release tag v$tag does not match the web-rs crate version $web — bump it before tagging"
            exit 1
          }
          Write-Host "version $tag matches tauri.conf, workspace Cargo, and web-rs — ok"

      - name: Guard updater pubkey
        shell: pwsh
        run: |
          $conf = Get-Content apps/desktop/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          if ($conf.plugins.updater.active -and $conf.plugins.updater.pubkey -like '*REPLACE_WITH*') {
            Write-Error "updater.active is true but updater.pubkey is still the placeholder — set a real key before releasing"
            exit 1
          }

      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,cargo-audit
      # main-branch CI runs `just audit` per-merge, but an advisory filed after
      # the last merge (or against this tag's exact lockfile) would otherwise
      # ship unscanned — gate it here so a new advisory fails the release.
      - name: audit (workspace)
        run: just audit

  # Per-platform bundles + signed updater artifacts. Each leg uploads its whole
  # bundle/ tree as an artifact; the `release` job assembles one cross-platform
  # latest.json from them (a single assembler — no latest.json write races).
  build:
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            recipe: build-windows-updater
            artifact: windows
          # Native Apple Silicon (aarch64); Intel/universal is a future addition.
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            recipe: build-macos-updater
            artifact: macos
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            recipe: build-linux-updater
            artifact: linux
    runs-on: ${{ matrix.os }}
    env:
      # The `secrets` context is not allowed in a step-level `if`; route the
      # Authenticode-cert presence check through job env instead.
      HAS_AUTHENTICODE_CERT: ${{ secrets.WINDOWS_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev patchelf

      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: ${{ matrix.rust_target }}, wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,trunk

      - name: Install Tauri CLI
        # Pinned to the exact `tauri` runtime version (Cargo.lock) for reproducible
        # release tooling; bump in lockstep with the crate. --locked pins its deps.
        run: cargo install tauri-cli --locked --version "=2.11.2"

      - name: Build bundles (with updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
        run: just ${{ matrix.recipe }}

      - name: Sign installers (optional Authenticode)
        if: matrix.os == 'windows-latest' && env.HAS_AUTHENTICODE_CERT == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $cert = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $cert)
          $signtool = Resolve-Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" `
            | Select-Object -Last 1
          $targets = @(
            "target\x86_64-pc-windows-msvc\release\bundle\msi\*.msi",
            "target\x86_64-pc-windows-msvc\release\bundle\nsis\*-setup.exe"
          )
          Get-ChildItem -Path $targets | ForEach-Object {
            & $signtool sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
              /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }

      # Authenticode signing rewrites the installer bytes, invalidating the
      # updater signature emitted during the build — regenerate it over the FINAL
      # NSIS artifact (the updater target). Only needed when we actually signed.
      - name: Refresh updater signature (NSIS)
        if: matrix.os == 'windows-latest' && env.HAS_AUTHENTICODE_CERT == 'true'
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
        run: |
          $exe = Get-ChildItem target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe `
            | Select-Object -First 1
          cargo tauri signer sign "$($exe.FullName)"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-${{ matrix.artifact }}
          path: target/${{ matrix.rust_target }}/release/bundle/
          if-no-files-found: error
          retention-days: 1

  # Assemble the cross-platform update manifest + checksums and publish a draft.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      # cargo tauri build does NOT emit latest.json (that is tauri-action's job);
      # assemble the one the updater endpoint serves ourselves, from each
      # platform's updater bundle + its `.sig`. macOS ships aarch64 only.
      - name: Assemble update manifest (latest.json)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $repo = "${{ github.repository }}"

          function Updater-Platform($glob) {
            $f = Get-ChildItem $glob -ErrorAction Stop | Select-Object -First 1
            $sigPath = "$($f.FullName).sig"
            if (-not (Test-Path $sigPath)) { Write-Error "missing updater signature for $($f.Name)"; exit 1 }
            return [ordered]@{
              signature = (Get-Content $sigPath -Raw).Trim()
              url       = "https://github.com/$repo/releases/download/$tag/$($f.Name)"
            }
          }

          $platforms = [ordered]@{
            "windows-x86_64" = Updater-Platform "artifacts/bundle-windows/nsis/*-setup.exe"
            "darwin-aarch64" = Updater-Platform "artifacts/bundle-macos/macos/*.app.tar.gz"
            "linux-x86_64"   = Updater-Platform "artifacts/bundle-linux/appimage/*.AppImage"
          }

          # The updater's `notes` field powers the in-app changelog splash. Pull
          # this version's CHANGELOG.md section: lines after the matching
          # `## [X.Y.Z]` header until the next `## [` section header.
          $notes = ""
          if (Test-Path CHANGELOG.md) {
            $collecting = $false
            $buf = New-Object System.Collections.Generic.List[string]
            foreach ($line in (Get-Content CHANGELOG.md)) {
              if ($line -match '^##\s+\[') {
                if ($collecting) { break }
                if ($line -match "^##\s+\[$([regex]::Escape($version))\]") { $collecting = $true }
                continue
              }
              if ($collecting) { $buf.Add($line) }
            }
            $notes = ($buf -join "`n").Trim()
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "See the release notes on GitHub for what's new in v$version."
          }

          $manifest = [ordered]@{
            version   = $version
            notes     = $notes
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = $platforms
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path latest.json -Encoding utf8
          Get-Content latest.json

      # Publish hashes so IT can pin what they deploy (the MSI carries no
      # integrity artifact when the optional Authenticode cert is absent).
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $assets = @(
            Get-ChildItem artifacts/bundle-windows/msi/*.msi
            Get-ChildItem artifacts/bundle-windows/nsis/*-setup.exe
            Get-ChildItem artifacts/bundle-macos/dmg/*.dmg
            Get-ChildItem artifacts/bundle-linux/appimage/*.AppImage
            Get-ChildItem artifacts/bundle-linux/deb/*.deb
            Get-Item latest.json
          )
          $assets | ForEach-Object {
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower(), $_.Name
          } | Set-Content -Path SHA256SUMS -Encoding utf8
          Get-Content SHA256SUMS

      # GitHub release assets are a flat list (no folders), so group the downloads
      # by OS in the release body instead. Cosmetic only — the updater keys off
      # latest.json's URLs, not this table, so it can't affect auto-update.
      # generate_release_notes appends GitHub's auto "What's Changed" below this.
      - name: Build download table (release body)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          function Row($glob, $notes) {
            $f = Get-ChildItem $glob -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $f) { return $null }
            return "| [``$($f.Name)``](https://github.com/$repo/releases/download/$tag/$($f.Name)) | $notes |"
          }
          $body = New-Object System.Collections.Generic.List[string]
          $body.Add("## Downloads")
          $body.Add("")
          $body.Add("### Windows")
          $body.Add("")
          $body.Add("| File | Notes |")
          $body.Add("| --- | --- |")
          @(
            (Row "artifacts/bundle-windows/nsis/*-setup.exe" "Installer (per-user, **auto-updates**) — most people want this."),
            (Row "artifacts/bundle-windows/msi/*.msi" "MSI for enterprise rollout (SCCM/Intune); not auto-updated.")
          ) | Where-Object { $_ } | ForEach-Object { $body.Add($_) }
          $body.Add("")
          $body.Add("### macOS (Apple Silicon)")
          $body.Add("")
          $body.Add("| File | Notes |")
          $body.Add("| --- | --- |")
          @(
            (Row "artifacts/bundle-macos/dmg/*.dmg" "Disk image. Unsigned — first launch needs a one-time Gatekeeper bypass (see the README).")
          ) | Where-Object { $_ } | ForEach-Object { $body.Add($_) }
          $body.Add("")
          $body.Add("### Linux (x86_64)")
          $body.Add("")
          $body.Add("| File | Notes |")
          $body.Add("| --- | --- |")
          @(
            (Row "artifacts/bundle-linux/appimage/*.AppImage" "Portable, runs on most distros (**auto-updates**); ``chmod +x`` then run."),
            (Row "artifacts/bundle-linux/deb/*.deb" "Debian / Ubuntu package.")
          ) | Where-Object { $_ } | ForEach-Object { $body.Add($_) }
          $body.Add("")
          $body.Add("SHA-256 checksums for every file are in ``SHA256SUMS``.")
          $body -join "`n" | Set-Content -Path release-body.md -Encoding utf8
          Get-Content release-body.md

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            artifacts/bundle-windows/msi/*.msi
            artifacts/bundle-windows/nsis/*-setup.exe
            artifacts/bundle-windows/nsis/*-setup.exe.sig
            artifacts/bundle-macos/dmg/*.dmg
            artifacts/bundle-macos/macos/*.app.tar.gz
            artifacts/bundle-macos/macos/*.app.tar.gz.sig
            artifacts/bundle-linux/appimage/*.AppImage
            artifacts/bundle-linux/appimage/*.AppImage.sig
            artifacts/bundle-linux/deb/*.deb
            latest.json
            SHA256SUMS
          # Draft first, human publishes: a review checkpoint for the notes; the
          # floating latest.json endpoint never 404s while assets attach; a bad
          # build is caught before the silent auto-updater ships it.
          draft: true
          # OS-grouped download table on top; GitHub's auto "What's Changed" is
          # appended below it by generate_release_notes.
          body_path: release-body.md
          generate_release_notes: true
          # Every glob is mandatory: a renamed bundle path must fail the release,
          # not silently publish without an installer/.sig/manifest.
          fail_on_unmatched_files: true

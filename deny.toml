# cargo-deny configuration. Complements `cargo audit` (which only checks the
# RustSec advisory DB) with license-policy and crate-source gating.
# Run locally with `cargo deny check`; CI runs it on every PR (see ci.yml).

[advisories]
# RustSec advisory database. `cargo audit` already gates vulnerabilities in CI;
# this section lets `cargo deny check advisories` do the same in one tool.
version = 2
yanked = "deny"
ignore = [
    # glib unsound VariantStrIter — transitive GTK3 (Linux-only) dep with no
    # upgrade path until Tauri moves off GTK3; unreachable in the shipped
    # Windows/macOS builds. Kept in sync with .cargo/audit.toml (see there for
    # the full rationale + drop condition).
    "RUSTSEC-2024-0429",
    # quick-xml 0.39 DoS-class parser issues, transitive via plist -> tauri;
    # plist parses only the app's own bundle metadata, never untrusted XML.
    # Kept in sync with .cargo/audit.toml (full rationale + drop condition).
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
# Allow-list of SPDX license IDs seen across the dependency tree (surveyed via
# `cargo metadata`). All are permissive / weak-copyleft and compatible with
# this project's own `MIT OR Apache-2.0`. Add to this list deliberately when a
# new dependency introduces a new (acceptable) license.
version = 2
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "Unlicense",
    "0BSD",
]
# A few crates ship their license text rather than a clear SPDX expression;
# raise this threshold only if a legitimately-licensed crate trips it.
confidence-threshold = 0.8

[bans]
# Warn (do not fail) on duplicate versions of the same crate — common and
# usually benign in a large tree, but worth surfacing.
multiple-versions = "warn"
# Deny wildcard ("*") version requirements on crates.io dependencies, but allow
# them for in-workspace `path = "..."` deps: our member crates intentionally
# reference each other by path without a version (they ship together, never
# published independently), and that is not a supply-chain wildcard.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
# Only crates.io and the one git dependency the frontend needs (tauri-sys,
# pinned to its v2 branch) are permitted. A new git/registry source must be
# added here deliberately.
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/JonasKruckenberg/tauri-sys"]
